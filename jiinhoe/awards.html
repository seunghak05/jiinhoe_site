const al = document.getElementById('al');
const af = document.getElementById('af');
let AD = [];

function buildFilterBar() {
  const years = [...new Set(AD.map(a => a.y))].sort((a, b) => b - a);
  const latest = years[0];
  af.innerHTML =
    `<button class="fb on" data-y="all">전체 보기</button>` +
    years.map(y => `<button class="fb" data-y="${y}">${y}년</button>`).join('');
  af.querySelectorAll('.fb').forEach(b => b.addEventListener('click', () => {
    af.querySelectorAll('.fb').forEach(x => x.classList.remove('on'));
    b.classList.add('on');
    renderAwards(b.dataset.y === 'all' ? AD : AD.filter(a => a.y == b.dataset.y));
  }));
}

function renderAwards(data) {
  const f = (af.querySelector('.fb.on') || {}).dataset?.y || 'all';
  al.innerHTML = '';
  if (!data.length) {
    al.innerHTML = '<p style="padding:2rem 0;color:#aaa9a4">해당 연도의 수상 내역이 없습니다.</p>';
    return;
  }
  data.forEach(a => {
    const lbl = (f === 'all' || !a.d) ? a.y + '년' : a.d;
    const div = document.createElement('div');
    div.className = 'award-row';
    div.innerHTML = `<div class="award-dt">${lbl}</div><div><p class="award-nm">${a.n}</p><ul class="award-rs">${a.r.map(x => `<li>${x}</li>`).join('')}</ul></div>`;
    al.appendChild(div);
  });
}

function applyAwards() {
  buildFilterBar();
  renderAwards(AD);
}

async function initAwards() {
  if (!SUPABASE_CONFIGURED) { useFallback(); return; }
  try {
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const { data, error } = await sb.from('awards').select('*')
      .order('year', { ascending: false }).order('id', { ascending: false });
    if (error || !data || !data.length) { useFallback(); return; }
    AD = data.map(a => ({ y: a.year, d: a.date, n: a.name, r: a.results }));
  } catch (_) { useFallback(); return; }
  applyAwards();
}
function useFallback() {
  AD = AD_FALLBACK;
  applyAwards();
}
initAwards();

    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    if (!data || !data.length) return;
    const url = data[0].value;
    if (!url) return;
    document.querySelectorAll('.ft-insta-link,.nav-insta-link').forEach(function(a){ a.href = url; });
  } catch(_) {}
})();
</script>
