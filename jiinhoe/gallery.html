<script>
function initLightbox() {
  const items = [...document.querySelectorAll('.gi')];
  const lb    = document.getElementById('lb');
  const lbImg = document.getElementById('lb-img');
  const lbCap = document.getElementById('lb-cap');
  let cur = 0;

  function open(i) {
    cur = i;
    const img = items[i].querySelector('img');
    const cap = items[i].querySelector('.gi-cap span');
    lbImg.src = img.src;
    lbCap.textContent = cap ? cap.textContent : '';
    lb.classList.add('on');
    document.body.style.overflow = 'hidden';
  }
  function close() {
    lb.classList.remove('on');
    document.body.style.overflow = '';
  }
  function prev() { open((cur - 1 + items.length) % items.length); }
  function next() { open((cur + 1) % items.length); }

  items.forEach((el, i) => el.addEventListener('click', () => open(i)));
  document.getElementById('lb-close').addEventListener('click', close);
  document.getElementById('lb-prev').addEventListener('click', prev);
  document.getElementById('lb-next').addEventListener('click', next);
  lb.addEventListener('click', e => { if (e.target === lb) close(); });
  document.addEventListener('keydown', e => {
    if (!lb.classList.contains('on')) return;
    if (e.key === 'Escape')     close();
    if (e.key === 'ArrowLeft')  prev();
    if (e.key === 'ArrowRight') next();
  });
}

async function initGallery() {
  if (!SUPABASE_CONFIGURED) { initLightbox(); return; }
  try {
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const { data, error } = await sb.from('gallery').select('*').order('sort_order').order('id');
    if (error || !data || !data.length) { initLightbox(); return; }
    const grid = document.querySelector('.g-grid');
    grid.innerHTML = data.map(g => `
      <div class="gi">
        <img src="${g.url}" alt="${g.caption}" loading="lazy" decoding="async">
        <div class="gi-cap"><span>${g.caption}</span></div>
      </div>
    `).join('');
  } catch (_) { /* use hardcoded fallback */ }
  initLightbox();
}
initGallery();
</script>
