<script>
const DD_FALLBACK = [
  {n:'삼례경희대태권도장',  r:'완주군', l:'https://naver.me/xDJdm8kY'},
  {n:'송천 효경석사 태권도', r:'전주시', l:'https://naver.me/GlJBEbJL'},
  {n:'팀 어게인 전주점',    r:'전주시', l:'https://naver.me/xS1QIpVn'},
  {n:'용인대마스터태권도',   r:'전주시', l:'https://naver.me/5zX5EsYT'},
  {n:'찬빛태권도장',        r:'진안군', l:'https://naver.me/FqWACESi'},
  {n:'탑클래스태권도장',    r:'전주시', l:'https://naver.me/FMce94en'},
  {n:'태양태권도',          r:'군산시', l:'https://naver.me/G7VmbQgB'},
  {n:'평화 효자태권도장',   r:'전주시', l:'https://naver.me/FUQyNTtn'},
  {n:'히어로키즈태권도장',  r:'군산시', l:'https://naver.me/xUwPQiXf'}
];

let DD = [];
const dl = document.getElementById('dl');
const dfBtns = document.querySelectorAll('#df .fb');

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function renderD(data) {
  dl.innerHTML = '';
  shuffle(data);
  data.forEach(d => {
    const a = document.createElement('a');
    a.href = d.l;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.className = 'd-card';
    a.innerHTML = `<p class="d-nm">${d.n}</p><p class="d-rg">${d.r}</p><span class="d-arrow">↗</span>`;
    dl.appendChild(a);
  });
}

dfBtns.forEach(b => b.addEventListener('click', () => {
  dfBtns.forEach(x => x.classList.remove('on'));
  b.classList.add('on');
  renderD(b.dataset.r === 'all' ? [...DD] : DD.filter(d => d.r === b.dataset.r));
}));

async function initDojangs() {
  if (!SUPABASE_CONFIGURED) { DD = DD_FALLBACK; renderD([...DD]); return; }
  try {
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const { data, error } = await sb.from('dojangs').select('*').order('sort_order').order('id');
    if (error || !data || !data.length) { DD = DD_FALLBACK; renderD([...DD]); return; }
    DD = data.map(d => ({ n: d.name, r: d.region, l: d.map_link }));
  } catch (_) { DD = DD_FALLBACK; }
  renderD([...DD]);
}
initDojangs();
</script>
<script>
(async function(){
  if(typeof SUPABASE_CONFIGURED==='undefined'||!SUPABASE_CONFIGURED) return;
  try{
    var sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
    var res=await sb.from('settings').select('value').eq('key','instagram_url');
    if(!res.data||!res.data.length||!res.data[0].value) return;
    var url=res.data[0].value;
    document.querySelectorAll('.ft-insta-link,.nav-insta-link').forEach(function(a){a.href=url;});
  }catch(e){}
})();
</script>
